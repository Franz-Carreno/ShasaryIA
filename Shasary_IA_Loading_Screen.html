         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
</div>
<div class="g_id_signin"
         data-type="standard"
         data-shape="pill"

<!-- Developer Fallback Login Button -->
<button id="dev-login-btn" class="w-full mt-4 py-2.5 rounded-full border border-primary/30 text-primary hover:bg-primary/10 transition-colors font-label-caps text-label-caps uppercase tracking-wider text-[12px] active:scale-95">
    Acceso de Desarrollador (Simulado)

<script>
  const targetPage = 'Shasary_IA_Chat_Interface.html';
  const statusNode = document.getElementById('loading-status');
  const progressFill = document.getElementById('progress-fill');
  const loadingInterface = document.getElementById('loading-interface');
  const loginInterface = document.getElementById('login-interface');
  const devLoginBtn = document.getElementById('dev-login-btn');
  
  let progress = 0;
  let dots = 0;
  const intervalMs = 50;
  const totalDurationMs = 2000;
  const progressStep = 100 * intervalMs / totalDurationMs;

  function decodeJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    } catch (e) {
      return null;
    }
  }

  window.handleCredentialResponse = function(response) {
    const payload = decodeJwt(response.credential);
    if (payload) {
      const user = {
        name: payload.name || "Usuario de Google",
        email: payload.email || "",
        picture: payload.picture || ""
      };
      localStorage.setItem('shasary_user', JSON.stringify(user));
      window.location.href = targetPage;
    } else {
      alert("Error al validar credenciales de Google");
    }
  };

  async function fetchConfigAndInit() {
    try {
      const res = await fetch('/api/config');
      if (res.ok) {
        const config = await res.json();
        if (config.googleClientId) {
          const gIdOnload = document.getElementById('g_id_onload');
          if (gIdOnload) {
            gIdOnload.setAttribute('data-client_id', config.googleClientId);
          }
        }
      }
    } catch (err) {
      console.warn("No se pudo obtener el Client ID del backend", err);
    }
  }

  fetchConfigAndInit();

  const updateLoader = () => {
    if (progressFill) {
      progress = Math.min(100, progress + progressStep);
      progressFill.style.width = `${progress}%`;
    }

    dots = (dots + 1) % 4;
    if (statusNode) {
      statusNode.textContent = progress >= 100 ? 'Sistemas listos' : 'Preparando sistemas' + '.'.repeat(dots);
    }

    if (progress >= 100) {
      clearInterval(loaderTimer);
      setTimeout(() => {
        const user = localStorage.getItem('shasary_user');
        if (user) {
          window.location.href = targetPage;
        } else {
          loadingInterface.classList.add('hidden');
          loginInterface.classList.remove('hidden');
        }
      }, 300);
    }
  };

  const loaderTimer = setInterval(updateLoader, intervalMs);
  updateLoader();

  devLoginBtn.addEventListener('click', () => {
    const user = {
      name: "Desarrollador Shasary",
      email: "dev@shasary.ia",
      picture: "https://lh3.googleusercontent.com/a/default-user"
    };
    localStorage.setItem('shasary_user', JSON.stringify(user));
    window.location.href = targetPage;
  });
</script>
